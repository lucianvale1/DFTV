<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title | default: "Dispatches from the Vale" }}</title>

  <link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script>
    if (localStorage.getItem('theme') === 'agartha') {
      document.documentElement.classList.add('agartha');
    }
  </script>

  <style>
    :root {
      --bg: #121212;
      --fg: #f2f0e6;
      --fg-dim: #a8a69c;
      --accent: #ff4400;
      --border: #1e1e1e;
      --tag-bg: #1e1e1e;
      --bracket: #ffffff;
      --darc-orange: #ff4400;
      --darc-blue: #3a5dae;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    .agartha {
      --bg: #f2f0e6;
      --fg: #111111;
      --fg-dim: #535247;
      --accent: #ff4400;
      --border: #d4d2c8;
      --tag-bg: var(--accent);
      --bracket: #111111;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: 15px; }

    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      color: var(--fg);
      font-family: var(--sans);
      line-height: 1.6;
      min-height: 100vh;
    }

    .agartha body {
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.08) 1px, transparent 1px);
    }

    header {
      border-bottom: 4px solid var(--accent);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #111111;
      z-index: 1000;
      transform: translateY(0);
      transition: transform 0.3s ease;
    }

    header.header-hidden {
      transform: translateY(-100%);
    }

    main {
      padding-top: 4rem;
    }

    .site-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1rem, 1.8vw, 1.4rem);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #ffffff;
      text-decoration: none;
    }

    .site-title:hover { color: var(--accent); }

    .tilt-char {
      display: inline-block;
      transform-origin: center;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 4rem 3rem;
      padding-top: calc(4rem + 60px);
    }

        .hero {
            margin-bottom: 5rem;
            display: flex;
            gap: 3rem;
            align-items: stretch;
        }

.hero-index-wrapper {
  display: flex;
  align-items: stretch;     /* ← critical */
  gap: 1rem;
}

.hero-arrow {
  width: 3.5rem;            /* horizontal presence */
  height: 100%;             /* ← matches index height */
  background-color: var(--accent);
  fill: var(--accent);

  -webkit-mask: url('/assets/arrow.svg') no-repeat center;
  -webkit-mask-size: contain;
          mask: url('/assets/arrow.svg') no-repeat center;
          mask-size: contain;

  opacity: 0.8;
}

.hero-index {
  font-size: 5rem;
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  line-height: 0.85;        /* defines the block height */
  color: var(--fg);
  letter-spacing: -0.02em;
  opacity: 0.85;
  display: flex;            /* ensures height consistency */
  align-items: flex-start;
}


    .hero-text {
  font-family: var(--mono);          /* ← critical */
  font-weight: 400;
  font-size: 0.95rem;                /* slightly smaller = quieter */
  line-height: 1.85;
  color: var(--fg-dim);
  max-width: 560px;
  display: flex;
  align-items: center;
  letter-spacing: 0.02em;
  text-align: left;                  /* ← critical */
}

    footer {
      margin-top: 5rem;
      margin-bottom: 5rem;
      padding-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .footer-text {
      font-size: 0.6rem;
      color: var(--fg);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

.tag {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.05em;
  padding: 0.25rem 0.5rem;
  text-transform: uppercase;
  transition: all 0.2s ease;
  border-radius: 3px;
  color: var(--accent);
  background: var(--tag-bg);
  border: 1px solid rgba(255, 68, 0, 0.3);
}

.agartha .tag {
  color: #ffffff;
  border: 1px solid var(--accent);
}
    
    hr {
      border: none;
      border-top: 1px solid var(--accent);
      opacity: 0.35;
      margin: 2.2rem 0 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

        .hero {
            animation: fadeIn 0.6s ease-out;
        }

        .post {
            animation: fadeIn 0.5s ease-out backwards;
        }

        .post:nth-child(1) { animation-delay: 0.1s; }
        .post:nth-child(2) { animation-delay: 0.15s; }

        @media (max-width: 768px) {
            header {
                padding: 1.5rem;
                flex-direction: column;
                gap: 0.25rem;
                align-items: flex-start;
            }

            main {
                padding: 2rem 1.5rem;
                padding-top: calc(2rem + 60px);
            }

            .hero {
                flex-direction: column;
                gap: 1.5rem;
            }

            .hero-index {
                font-size: 4rem;
                line-height: 1;
            }

            .hero-content {
                padding-top: 0;
            }

            .post {
                padding: 0;
            }

            .post-image {
                height: 200px;
            }

            .post-title {
                font-size: 1.3rem;
            }
        }

  </style>
</head>

<body>

<header>
  <a href="/" class="site-title"><span class="tilt-char">D</span><span class="tilt-char">F</span><span class="tilt-char">T</span><span class="tilt-char">V</span></a>
</header>

<main>
  {% if page.url == "/" or page.url == "/index.html" %}

<!-- need to figure out hero before uncommenting
  
  {% assign dispatch_count = site.posts | size %}
  
<section class="hero">
  <div class="hero-index-wrapper">
    <span class="hero-arrow"></span>
    <span class="hero-index">
      {{ dispatch_count | prepend: "0" | slice: -2, 2 }}
    </span>
  </div>

  <p class="hero-text">
    Observations written in transit. Between projects, jurisdictions, systems. No schedule. No assumed audience.
  </p>
</section>

  -->


{% endif %}
  
  {{ content }}
</main>

<footer>
  <button class="agartha-toggle"
    style="font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.1em;
           background: transparent; border: 1px solid var(--accent);
           color: var(--accent); padding: 0.5rem 1rem; cursor: pointer;
           text-transform: uppercase; transition: all 0.3s;">
    Enter Agartha
  </button>

  <span class="footer-text">© 2026 Vale Observer // Nothing here is advice</span>
</footer>

<script>
document.querySelectorAll('.tilt-char').forEach(char => {
  const angle = Math.random() * 20 - 10;
  char.style.transform = `rotate(${angle}deg)`;
});

const header = document.querySelector('header');
let lastScrollY = window.scrollY;

window.addEventListener('scroll', () => {
  const currentScrollY = window.scrollY;
  if (currentScrollY > lastScrollY && currentScrollY > 60) {
    header.classList.add('header-hidden');
  } else {
    header.classList.remove('header-hidden');
  }
  lastScrollY = currentScrollY;
}, { passive: true });

const root = document.documentElement;

function updateToggles() {
  const isAgartha = root.classList.contains('agartha');
  document.querySelectorAll('.agartha-toggle').forEach(btn => {
    btn.textContent = isAgartha ? 'Exit Agartha' : 'Enter Agartha';
  });
}

updateToggles();

document.querySelectorAll('.agartha-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    if (root.classList.contains('agartha')) {
      root.classList.remove('agartha');
      localStorage.setItem('theme', 'surface');
    } else {
      root.classList.add('agartha');
      localStorage.setItem('theme', 'agartha');
    }
    updateToggles();
  });
});
</script>

</body>
</html>
