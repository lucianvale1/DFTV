---
layout: default
title: Archive
permalink: /archive/
---

<style>
  .archive-header {
    font-family: var(--mono);
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--fg-dim);
    margin-bottom: 2.4rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .archive-header::before {
    content: '■';
    color: var(--accent);
    font-size: 0.95rem;
  }

  .archive-row {
    display: flex;
    align-items: baseline;           
    gap: 1.4rem;
    padding: 1.4rem 0;
    border-bottom: 1px solid rgba(189, 71, 0, 0.35);  /* #BD4700 at 35% opacity */
  }

  .archive-row:last-child {
    border-bottom: none;              
  }

  .archive-date {
    font-family: var(--mono);
    font-size: 0.95rem;
    color: var(--fg);
    white-space: nowrap;
    min-width: 90px;                  
    opacity: 0.75
  }

  .archive-post-title {
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 500;
    color: var(--fg);
    text-decoration: none;
    transition: color 0.2s ease;
    flex: 1;                          
  }

  .archive-post-title:hover {
    color: var(--accent);
  }

  .archive-tags {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;                
  }

  @media (max-width: 600px) {
    .archive-row {
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-items: flex-start;
    }

    .archive-date {
      font-size: 0.75rem;
      min-width: unset;
      opacity: 0.55;
    }

    .archive-post-title {
      width: 100%;
      order: -1;
    }

    .archive-tags {
      flex-wrap: wrap;
      gap: 0.35rem;
    }
  }

</style>

<div class="archive-header">All Dispatches</div>

{% for post in site.posts %}
  <div class="archive-row">
    <span class="archive-date">{{ post.date | date: "%Y.%m.%d" }}</span>
    
    <a class="archive-post-title" href="{{ post.url }}">
      {{ post.title }}
    </a>
    
    {% if post.tags %}
      <div class="archive-tags">
        {% for tag in post.tags | sort %}
          <span class="tag">{{ tag | upcase }}</span>
        {% endfor %}
      </div>
    {% endif %}
  </div>
{% endfor %}
